## Event Consumer Example

```csharp
public class EmployeeCreatedEventConsumer : IConsumer<EmployeeCreatedEvent>
{
    private readonly CareerDbContext _dbContext;
    private readonly ILogger<EmployeeCreatedEventConsumer> _logger;

    public async Task Consume(ConsumeContext<EmployeeCreatedEvent> context)
    {
        var message = context.Message;

        _logger.LogInformation(
            "Processing EmployeeCreatedEvent for employee {EmployeeId}",
            message.EmployeeId);

        // Find applicable mandatory training requirements
        var requirements = await _dbContext.MandatoryTrainingRequirements
            .Where(mtr => mtr.IsActive &&
                         (mtr.DepartmentId == null || mtr.DepartmentId == message.DepartmentId) &&
                         (mtr.PositionId == null || mtr.PositionId == message.PositionId))
            .Include(mtr => mtr.TrainingProgram)
            .ToListAsync(context.CancellationToken);

        // Create enrollments
        foreach (var req in requirements)
        {
            var deadline = message.StartDate.AddDays(req.CompletionDeadlineDays);

            // Check if enrollment already exists (idempotency)
            var exists = await _dbContext.Enrollments
                .AnyAsync(e => e.EmployeeId == message.EmployeeId &&
                              e.TrainingProgramId == req.TrainingProgramId,
                         context.CancellationToken);

            if (!exists)
            {
                _dbContext.Enrollments.Add(new Enrollment
                {
                    EmployeeId = message.EmployeeId,
                    TrainingProgramId = req.TrainingProgramId,
                    EnrollmentDeadline = deadline,
                    Status = EnrollmentStatus.Pending
                });
            }
        }

        await _dbContext.SaveChangesAsync(context.CancellationToken);

        _logger.LogInformation(
            "Assigned {Count} mandatory training requirements to employee {EmployeeId}",
            requirements.Count,
            message.EmployeeId);
    }
}
```

