  "trainingRecordId": "123e4567-e89b-12d3-a456-426614174000",
  "employeeId": "123e4567-e89b-12d3-a456-426614174001",
  "courseName": "First Aid Certification",
  "expirationDate": "2025-02-15T00:00:00Z",
  "daysUntilExpiration": 30
}
```

