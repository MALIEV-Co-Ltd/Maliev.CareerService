### CertificationExpiringEvent
**Topic**: `career.training.expiring`
**Description**: Published when a certification is approaching expiration
**Consumers**: Notification Service

```yaml
CertificationExpiringEvent:
  type: object
  required:
    - trainingRecordId
    - employeeId
    - courseName
    - expirationDate
    - daysUntilExpiration
  properties:
    trainingRecordId:
      type: string
      format: uuid
      description: Training record with expiring certification
      example: "123e4567-e89b-12d3-a456-426614174000"
