### MandatoryTrainingOverdueEvent
**Topic**: `career.training.overdue`
**Description**: Published when mandatory training becomes overdue
**Consumers**: Notification Service, Compliance Service

```yaml
MandatoryTrainingOverdueEvent:
  type: object
  required:
    - employeeId
    - trainingProgramId
    - trainingName
    - dueDate
    - daysOverdue
  properties:
    employeeId:
      type: string
      format: uuid
      description: Employee with overdue training
      example: "123e4567-e89b-12d3-a456-426614174001"
    trainingProgramId:
      type: string
      format: uuid
      description: Training program that is overdue
      example: "123e4567-e89b-12d3-a456-426614174002"
    trainingName:
      type: string
      description: Name of the overdue training
      example: "Security Awareness Training"
    dueDate:
      type: string
      format: date-time
      description: Original due date
      example: "2025-01-01T00:00:00Z"
    daysOverdue:
      type: integer
      description: Number of days past the due date
      example: 14
```

**Example Message**:
```json
{
  "employeeId": "123e4567-e89b-12d3-a456-426614174001",
  "trainingProgramId": "123e4567-e89b-12d3-a456-426614174002",
  "trainingName": "Security Awareness Training",
  "dueDate": "2025-01-01T00:00:00Z",
  "daysOverdue": 14
}
```

