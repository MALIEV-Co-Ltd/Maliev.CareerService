## Events Consumed by Career Service

### EmployeeCreatedEvent
**Topic**: `employee.created`
**Description**: Consumed when a new employee is created in Employee Service
**Publisher**: Employee Service
**Purpose**: Automatically assign mandatory training based on department/position

```yaml
EmployeeCreatedEvent:
  type: object
  required:
    - employeeId
    - startDate
  properties:
    employeeId:
      type: string
      format: uuid
      description: Newly created employee identifier
      example: "123e4567-e89b-12d3-a456-426614174001"
    departmentId:
      type: string
      format: uuid
      nullable: true
      description: Employee's department
      example: "123e4567-e89b-12d3-a456-426614174003"
    positionId:
      type: string
      format: uuid
      nullable: true
      description: Employee's position
      example: "123e4567-e89b-12d3-a456-426614174004"
    startDate:
      type: string
      format: date-time
      description: Employee start date (used to calculate training deadlines)
      example: "2025-01-15T00:00:00Z"
```

**Example Message**:
```json
{
  "employeeId": "123e4567-e89b-12d3-a456-426614174001",
  "departmentId": "123e4567-e89b-12d3-a456-426614174003",
  "positionId": "123e4567-e89b-12d3-a456-426614174004",
  "startDate": "2025-01-15T00:00:00Z"
}
```

**Consumer Behavior**:
1. Query active mandatory_training_requirements matching department/position
2. For each requirement, create an enrollment with deadline = startDate + completionDeadlineDays
3. Queue employee creation event with retry (per FR-019a/b/c from clarifications)
4. Log failures after max retries for manual intervention

---

## Event Delivery Guarantees

### Published Events
- **At-Least-Once Delivery**: Events may be delivered multiple times
- **Retry Policy**: 3 retries with exponential backoff (per FR-014a/b from clarifications)
- **Dead Letter Queue**: Failed events after 3 retries logged for ops review

### Consumed Events
- **Idempotency**: EmployeeCreatedEvent consumer must be idempotent
- **Retry Policy**: MassTransit retry intervals: 1s, 5s, 30s, 1m, 5m
- **Error Handling**: Log failures and queue for manual intervention (per clarifications)

---

## MassTransit Configuration

```csharp
// In Program.cs
builder.AddMassTransitWithRabbitMq(cfg =>
{
    // Add consumer
    cfg.AddConsumer<EmployeeCreatedEventConsumer>();

    // Configure endpoints
    cfg.UsingRabbitMq((context, rabbitCfg) =>
    {
        // Retry policy
        rabbitCfg.UseMessageRetry(r => r.Intervals(
            TimeSpan.FromSeconds(1),
            TimeSpan.FromSeconds(5),
            TimeSpan.FromSeconds(30),
            TimeSpan.FromMinutes(1),
            TimeSpan.FromMinutes(5)
        ));

        rabbitCfg.ConfigureEndpoints(context);
    });
});
```

