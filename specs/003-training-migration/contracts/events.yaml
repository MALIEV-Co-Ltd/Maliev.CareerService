## Testing Events

### Publishing Events (Integration Test)
```csharp
[Fact]
public async Task RecordCompletion_PublishesTrainingCompletedEvent()
{
    // Arrange
    var harness = _testFixture.Harness;
    var service = _testFixture.GetService<ITrainingRecordService>();

    // Act
    await service.RecordCompletionAsync(...);

    // Assert
    Assert.True(await harness.Published.Any<TrainingCompletedEvent>());

    var published = harness.Published.Select<TrainingCompletedEvent>().First();
    Assert.Equal(employeeId, published.Context.Message.EmployeeId);
}
```

### Consuming Events (Integration Test)
```csharp
[Fact]
public async Task EmployeeCreated_AssignsMandatoryTraining()
{
    // Arrange
    var harness = _testFixture.Harness;

    // Act
    await harness.Bus.Publish(new EmployeeCreatedEvent(
        EmployeeId: employeeId,
        DepartmentId: departmentId,
        PositionId: null,
        StartDate: DateTime.UtcNow));

    // Assert
    Assert.True(await harness.Consumed.Any<EmployeeCreatedEvent>());

    var enrollments = await _dbContext.Enrollments
        .Where(e => e.EmployeeId == employeeId)
        .ToListAsync();

    Assert.NotEmpty(enrollments);
}
```
