# Integration Events Schema
# Training Records and Skills Migration
# Date: 2025-12-28

## Events Published by Career Service

### TrainingCompletedEvent
**Topic**: `career.training.completed`
**Description**: Published when an employee completes a training course
**Consumers**: Notification Service, Analytics Service

```yaml
TrainingCompletedEvent:
  type: object
  required:
    - trainingRecordId
    - employeeId
    - courseName
    - completionDate
  properties:
    trainingRecordId:
      type: string
      format: uuid
      description: Training record unique identifier
      example: "123e4567-e89b-12d3-a456-426614174000"
    employeeId:
      type: string
      format: uuid
      description: Employee who completed the training
      example: "123e4567-e89b-12d3-a456-426614174001"
    courseName:
      type: string
      description: Name of the completed training
      example: "Workplace Safety Training"
    completionDate:
      type: string
      format: date-time
      description: When the training was completed
      example: "2025-01-15T14:30:00Z"
    certificationExpiration:
      type: string
      format: date-time
      nullable: true
      description: When the certification expires (if applicable)
      example: "2026-01-15T00:00:00Z"
```

**Example Message**:
```json
{
  "trainingRecordId": "123e4567-e89b-12d3-a456-426614174000",
  "employeeId": "123e4567-e89b-12d3-a456-426614174001",
  "courseName": "Workplace Safety Training",
  "completionDate": "2025-01-15T14:30:00Z",
  "certificationExpiration": "2026-01-15T00:00:00Z"
}
```

